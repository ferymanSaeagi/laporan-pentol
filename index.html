<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pentol Jaya — V8 Cloud</title>
  
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22PentolJaya%22,%22short_name%22:%22Pentol%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0c0c0c%22,%22theme_color%22:%22#0c0c0c%22}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg: #0c0c0c; --surface: #161616; --surface2: #1e1e1e;
      --border: #2a2a2a; --text: #f0f0f0; --text-sub: #999;
      --green: #22c55e; --red: #ef4444; --accent: #f0f0f0;
      --tabbar-h: 65px; --font: 'DM Sans', sans-serif;
    }
    [data-theme="light"] {
      --bg: #f2f2f2; --surface: #ffffff; --surface2: #f7f7f7;
      --border: #e0e0e0; --text: #111; --text-sub: #666;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); overflow-x: hidden; transition: background 0.3s; }
    
    /* DYNAMIC NOTIF STYLE */
    .notif-popup {
      position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 400px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10000;
      transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .notif-popup.show { top: 20px; }
    .notif-icon { width: 40px; height: 40px; background: var(--bg); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

    /* UI COMPONENTS */
    #loadingOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: none; align-items: center; justify-content: center; }
    .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #appScreen { display: none; padding-bottom: 80px; }
    #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 12px; }
    
    .topbar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; height: var(--tabbar-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 100; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text-sub); gap: 4px; }
    .tab-item.active { color: var(--text); }

    input, textarea, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 10px; font-family: var(--font); outline: none; margin-top: 5px; }
    .btn-p { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .btn-p:active { transform: scale(0.98); opacity: 0.9; }

    /* CHAT AREA */
    .chat-messages { height: calc(100vh - 200px); overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
    .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; max-width: 85%; position: relative; line-height: 1.4; }
    .bubble.me { align-self: flex-end; background: var(--text); color: var(--bg); border-bottom-right-radius: 4px; }
    .bubble.other { align-self: flex-start; background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .chat-meta { font-size: 9px; opacity: 0.6; margin-bottom: 2px; font-weight: bold; }
  </style>
</head>
<body data-theme="dark">

<div id="loadingOverlay"><div class="spinner"></div></div>

<div id="dynNotif" class="notif-popup">
  <div class="notif-icon" id="nIcon">💬</div>
  <div style="flex:1">
    <div id="nTitle" style="font-weight:800;font-size:13px">Judul</div>
    <div id="nBody" style="font-size:12px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:250px">Pesan...</div>
  </div>
</div>

<div id="loginScreen">
  <div class="card" style="width:100%;max-width:350px">
    <div style="text-align:center;margin-bottom:25px">
      <h1 style="font-size:24px;letter-spacing:-1px">PENTOL JAYA <span style="font-size:10px;background:var(--text);color:var(--bg);padding:2px 6px;border-radius:5px">V8</span></h1>
      <p style="font-size:12px;color:var(--text-sub)">Cloud Monitoring System</p>
    </div>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <button class="btn-p" onclick="doLogin()">MASUK</button>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <div id="topAvatar" style="width:36px;height:36px;background:var(--text);color:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900">?</div>
      <div>
        <div id="topName" style="font-weight:800;font-size:14px">User</div>
        <div id="topRole" style="font-size:10px;color:var(--green);font-weight:700">ONLINE</div>
      </div>
    </div>
    <div onclick="confirmLogout()" style="font-size:18px;cursor:pointer">⏏</div>
  </div>

  <div class="content" style="padding:15px">
    
    <div class="page active" id="pageLaporan">
      <div class="card">
        <label style="font-size:10px;font-weight:800;color:var(--text-sub)">TANGGAL LAPORAN</label>
        <input type="text" id="tanggal">
      </div>
      <div class="card">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><label style="font-size:10px">STOK AWAL</label><input type="number" id="sa_pb" value="0"></div>
          <div><label style="font-size:10px">STOK KELUAR</label><input type="number" id="sk_pb" value="0"></div>
        </div>
        <div style="margin-top:10px">
          <label style="font-size:10px">OMSET HARI INI</label>
          <input type="number" id="omset" value="0">
        </div>
      </div>
      <button class="btn-p" onclick="generatePreview()">PREVIEW & KIRIM</button>
      
      <div id="res_wrap" style="display:none;margin-top:15px">
        <div id="output" style="background:var(--surface2);padding:15px;border-radius:12px;font-family:monospace;font-size:12px;border:1px dashed var(--border)"></div>
        <button class="btn-p" style="background:var(--green);color:white" onclick="kirimKeCloud()">KONFIRMASI KIRIM</button>
      </div>
    </div>

    <div class="page" id="pageChat">
      <div class="chat-messages" id="chatBox"></div>
      <div style="position:fixed;bottom:75px;left:15px;right:15px;display:flex;gap:8px">
        <input type="text" id="chatIn" placeholder="Tulis pesan..." style="border-radius:25px;padding-left:20px">
        <button onclick="sendChat()" style="background:var(--text);color:var(--bg);border:none;width:50px;height:50px;border-radius:50%;font-weight:bold">↑</button>
      </div>
    </div>

    <div class="page" id="pageSettings">
      <div class="card">
        <label style="font-size:10px;font-weight:800">TEMA APLIKASI</label>
        <select id="setTheme" onchange="changeTheme()">
          <option value="dark">Dark Monochrome</option>
          <option value="light">Light Mode</option>
        </select>
      </div>
      <div class="card" style="text-align:center">
        <p style="font-size:12px;color:var(--text-sub)">Status Akun</p>
        <div id="vipStatus" style="font-weight:800;font-size:18px;margin:5px 0">REGULER</div>
        <button class="btn-p" onclick="upgradeVIP()" id="vipBtn">UPGRADE VIP (RP 500)</button>
      </div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab-item active" onclick="switchPg('pageLaporan')"><span class="ti">📋</span><span>Laporan</span></div>
    <div class="tab-item" onclick="switchPg('pageChat')"><span class="ti">💬</span><span>Chat</span></div>
    <div class="tab-item" onclick="switchPg('pageSettings')"><span class="ti">⚙️</span><span>Settings</span></div>
  </div>
</div>

<script>
// --- KONFIGURASI FIREBASE ANDA ---
const firebaseConfig = {
  apiKey: "AIzaSyAILu80E4XZ3tYEg5q2KiGEYSRt-UXwbv8",
  authDomain: "pentol-jaya.firebaseapp.com",
  projectId: "pentol-jaya",
  storageBucket: "pentol-jaya.firebasestorage.app",
  messagingSenderId: "417031355177",
  appId: "1:417031355177:web:d9ccfc10457a44d0df1538",
  measurementId: "G-KM9Y92CC2G"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const USERS = {
  'owner': { p: 'ownerfais', n: 'Bos Owner', r: 'owner' },
  'penjual1': { p: '12345', n: 'Anomali', r: 'penjual' }
};

let me = null;
let firstLoad = true;

// --- DYNAMIC NOTIFICATION SYSTEM ---
function triggerNotif(title, text, icon = "💬") {
  const el = document.getElementById('dynNotif');
  document.getElementById('nTitle').textContent = title;
  document.getElementById('nBody').textContent = text;
  document.getElementById('nIcon').textContent = icon;
  
  el.classList.add('show');
  
  // Vibration (Hanya untuk Android)
  if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

  // Browser Native Notif (Jika App di Background)
  if (document.hidden && Notification.permission === "granted") {
    new Notification(title, { body: text });
  }

  setTimeout(() => el.classList.remove('show'), 4000);
}

// --- CORE APP ---
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if(USERS[u] && USERS[u].p === p) {
    me = { id: u, ...USERS[u] };
    localStorage.setItem('pentol_v8_user', u);
    startApp();
  } else {
    alert("Login Gagal!");
  }
}

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  document.getElementById('topName').textContent = me.n;
  document.getElementById('topAvatar').textContent = me.n.charAt(0);
  
  const d = new Date();
  document.getElementById('tanggal').value = d.toLocaleDateString('id-ID');
  
  if ("Notification" in window) Notification.requestPermission();
  
  applyTheme(localStorage.getItem('theme') || 'dark');
  listenRealtime();
}

function switchPg(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
}

// --- FIREBASE REALTIME ---
function listenRealtime() {
  // Listen Chat
  db.collection("chat").orderBy("time", "desc").limit(20).onSnapshot(snap => {
    const box = document.getElementById('chatBox');
    let html = "";
    snap.docs.reverse().forEach(doc => {
      const m = doc.data();
      const isMe = m.uid === me.id;
      html += `
        <div class="bubble ${isMe?'me':'other'}">
          ${!isMe ? `<div class="chat-meta">${m.un}</div>` : ''}
          ${m.txt}
        </div>`;
      
      // Notif Jika Ada Chat Baru & Bukan Saya
      if(!firstLoad && !isMe) triggerNotif(`Pesan dari ${m.un}`, m.txt, "💬");
    });
    box.innerHTML = html;
    box.scrollTop = box.scrollHeight;
    firstLoad = false;
  });

  // Listen Laporan (Khusus Owner dapat notif)
  if(me.r === 'owner') {
    db.collection("laporan").orderBy("time", "desc").limit(1).onSnapshot(snap => {
      if(!snap.empty && !firstLoad) {
        const lp = snap.docs[0].data();
        triggerNotif("📋 Laporan Masuk!", `Laporan baru dari ${lp.user}`, "📊");
      }
    });
  }
}

function sendChat() {
  const inp = document.getElementById('chatIn');
  if(!inp.value) return;
  db.collection("chat").add({
    uid: me.id, un: me.n, txt: inp.value, time: Date.now()
  });
  inp.value = "";
}

// --- LAPORAN ---
function generatePreview() {
  const sa = document.getElementById('sa_pb').value;
  const sk = document.getElementById('sk_pb').value;
  const res = `LAPORAN CLOUD V8\n-----------------\nUser: ${me.n}\nStok Awal: ${sa}\nStok Keluar: ${sk}\nOmset: ${document.getElementById('omset').value}\n-----------------\nStatus: Pending...`;
  document.getElementById('output').textContent = res;
  document.getElementById('res_wrap').style.display = 'block';
}

function kirimKeCloud() {
  const dat = {
    user: me.n,
    uid: me.id,
    content: document.getElementById('output').textContent,
    time: Date.now()
  };
  document.getElementById('loadingOverlay').style.display = 'flex';
  db.collection("laporan").add(dat).then(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('res_wrap').style.display = 'none';
    triggerNotif("Sistem", "Laporan Berhasil Terkirim!", "✅");
  });
}

// --- SETTINGS ---
function changeTheme() {
  const t = document.getElementById('setTheme').value;
  localStorage.setItem('theme', t);
  applyTheme(t);
}
function applyTheme(t) {
  document.body.setAttribute('data-theme', t);
  document.getElementById('setTheme').value = t;
}

function upgradeVIP() {
  localStorage.setItem('vip_' + me.id, 'true');
  document.getElementById('vipStatus').textContent = "VIP PREMIUM";
  document.getElementById('vipBtn').style.display = "none";
  triggerNotif("VIP", "Akun Anda Sekarang Premium!", "💎");
}

function confirmLogout() {
  localStorage.removeItem('pentol_v8_user');
  location.reload();
}

// Auto Session
const saved = localStorage.getItem('pentol_v8_user');
if(saved && USERS[saved]) {
  me = { id: saved, ...USERS[saved] };
  startApp();
}

// Service Worker (Biar bisa jalan di Background)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("fetch", function(event) {});'));
}
</script>
</body>
</html>
